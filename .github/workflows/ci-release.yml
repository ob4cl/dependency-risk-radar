name: CI and release prep

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install (untrusted PR mode)
        if: github.event_name == 'pull_request'
        run: corepack pnpm install --frozen-lockfile --ignore-scripts

      - name: Install (trusted mode)
        if: github.event_name != 'pull_request'
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm build

      - name: Verify GitHub Action dist integrity
        if: github.event_name != 'pull_request'
        run: |
          corepack pnpm --filter @drr/github-action build
          git diff --exit-code -- apps/github-action/dist/index.cjs

      - name: Test
        run: corepack pnpm test

  action-demo:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build action bundle
        run: corepack pnpm --filter @drr/github-action build

      - name: Verify action dist integrity
        run: git diff --exit-code -- apps/github-action/dist/index.cjs

      - name: Run Dependency Risk Radar action
        id: radar
        uses: ./apps/github-action
        with:
          repo: .
          base: ${{ github.sha }}
          head: ${{ github.sha }}
          format: markdown
          live-metadata: false

      - name: Show action outputs
        run: |
          echo "decision=${{ steps.radar.outputs.decision }}"
          echo "score=${{ steps.radar.outputs.score }}"
          echo "exit-code-recommendation=${{ steps.radar.outputs.exit-code-recommendation }}"

  release-prep:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build GitHub Action bundle
        run: corepack pnpm --filter @drr/github-action build

      - name: Verify action dist integrity
        run: git diff --exit-code -- apps/github-action/dist/index.cjs

      - name: Prepare npm package
        run: cd apps/cli && npm pack --dry-run --json

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - name: Install dependencies (untrusted PR mode)
        if: github.event_name == 'pull_request'
        run: corepack pnpm install --frozen-lockfile --ignore-scripts
      - name: Install dependencies (trusted mode)
        if: github.event_name != 'pull_request'
        run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build
      - name: Verify GitHub Action dist integrity
        if: github.event_name != 'pull_request'
        run: |
          corepack pnpm --filter @drr/github-action build
          git diff --exit-code -- apps/github-action/dist/index.cjs
      - run: corepack pnpm test
